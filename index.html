  .mirror{background:var(--surface2);border:1px solid var(--line);border-left:4px solid var(--coral);border-radius:0 12px 12px 0;padding:14px 16px;font-size:16px;color:var(--ink-soft);margin:14px 0;font-weight:600;text-align:left}

  .timer{display:flex;align-items:center;justify-content:center;gap:9px;margin:12px 0;font-size:15px;color:var(--ink-soft);font-weight:700}

  .price-img{width:100%;max-width:340px;display:block;margin:8px auto 4px;border-radius:12px}

  .guarantee{display:flex;gap:14px;align-items:center;background:var(--good-bg);border:1px solid var(--good-line);border-radius:14px;padding:15px 16px;margin:14px 0;text-align:left}

        imgTag(IMG.b1,"","Bônus 1")+imgTag(IMG.b2,"","Bônus 2")+
        imgTag(IMG.b3,"","Bônus 3")+imgTag(IMG.b4,"","Bônus 4")+
      '</div>'+
      imgTag(IMG.b6mais,"mockup","Mais 6 bônus exclusivos")+
      proof("Quem já está estudando com o material")+
      guideLine("Tudo isso junto por um valor que vai te surpreender...")+
      '<button class="btn btn-gold pulse-cta" data-act="next">Quero o Combo Completo! <span aria-hidden="true">→</span></button>'+
      '</div>';
  }

  function stackRow(s){
    return '<li><span class="ck">✓</span><span class="nm"><b>'+s.n+'</b><small>'+s.d+'</small></span>'+
      '<span style="text-align:right"><span class="pr">R$'+s.p+'</span><br><span class="free">GRÁTIS</span></span></li>';
  }

  function offer(){
    var total=STACK.reduce(function(a,s){return a+s.p;},0);
    var nm=state.name?state.name+", ":"";
    app.innerHTML='<div class="view">'+
      '<div class="center"><span class="badge-top">🔥 O mais vendido</span></div>'+
      '<h2 class="sec-h">'+nm+'você está a um passo de <span class="hl">entender a Umbanda com clareza</span></h2>'+
      '<div class="redeem"><div class="rt">💎 Você acumulou <b>'+state.points+' pontos</b> de Saldo Espiritual.</div><div class="rt" style="margin-top:4px">Eles desbloquearam o <b>valor promocional de hoje</b>, válido enquanto esta página estiver aberta.</div></div>'+
      '<div class="timer"><span>⏳ Sua condição expira em</span><span class="clock" id="clock">15:00</span></div>'+
      '<div class="card"><ul class="stack">'+STACK.map(function(s){return stackRow(s);}).join("")+
        '<div class="totrow"><span class="tl">Valor real de tudo:</span><span class="tv">R$'+total+'</span></div>'+
        '<p class="stacknote">Você não paga nada perto disso hoje 👇</p>'+
      '</ul></div>'+
      imgTag(IMG.preco,"price-img","De R$297 por apenas R$19,90")+
      '<p class="center lead" style="font-size:15px;margin-top:2px">Pagamento único · Acesso vitalício · Sem mensalidade</p>'+
      '<div class="guarantee"><div class="seal">🛡️</div><div><div class="gt">60 dias de garantia incondicional</div><p>Estude com calma por 60 dias. Se não sentir evolução na sua fé, devolvemos 100% do valor, sem perguntas.</p></div></div>'+
      proof("O que dizem os alunos")+
      '<p class="center lead" style="font-size:15.5px;margin:6px 0 2px">Dê hoje o passo para <b class="hl">servir na gira com segurança</b> e honrar os seus guias com o conhecimento que eles merecem.</p>'+
      '<a class="btn btn-gold pulse-cta" href="'+CHECKOUT+'" data-act="buy" target="_blank" rel="noopener">Quero começar minha jornada por R$19,90 <span aria-hidden="true">🔒</span></a>'+
      imgTag(IMG.secure,"secure-img","Ambiente 100% seguro, Pix, cartão e boleto")+
      '</div>';
    startClock();
  }

  var clockTimer=null;
  function startClock(){
    var end=Date.now()+15*60*1000;
    var el=document.getElementById("clock");
    if(clockTimer)clearInterval(clockTimer);
    clockTimer=setInterval(function(){
      if(!document.getElementById("clock")){clearInterval(clockTimer);return;}
      var left=Math.max(0,Math.floor((end-Date.now())/1000));
      var m=Math.floor(left/60), s=left%60;
      el.textContent=(m<10?"0":"")+m+":"+(s<10?"0":"")+s;
      if(left<=0)clearInterval(clockTimer);
    },1000);
  }

  app.addEventListener("click",function(e){
    var fac=e.target.closest(".vfacade");
    if(fac){
      if(bgm){ bgm.pause(); musicOn=false; updateMusicIcon(); } // pausa a musica de fundo p/ o video ter o som limpo
      var box=fac.closest(".videobox"); var id=fac.getAttribute("data-vid");
      box.innerHTML='<iframe src="https://player.vimeo.com/video/'+id+'?autoplay=1&title=0&byline=0&portrait=0&badge=0&player_id=0&app_id=58479" allow="autoplay; fullscreen; picture-in-picture; clipboard-write" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>';
      return;
    }
    startMusic();
    var t=e.target.closest("[data-act]"); if(!t)return;
    var act=t.getAttribute("data-act");
    if(act==="seg"){ state.seg=t.getAttribute("data-v"); animateSaldo(state.points+20); setTimeout(function(){go(1);},200); }
    else if(act==="ans"){ answer(parseInt(t.getAttribute("data-qi"),10),parseInt(t.getAttribute("data-oi"),10)); }
    else if(act==="next"){ go(1); }
    else if(act==="savename"){ var el=document.getElementById("nameInp"); if(el && !t.getAttribute("data-skip")){ state.name=(el.value||"").trim().replace(/[<>]/g,""); } go(1); }
    else if(act==="buy"){ if(CHECKOUT==="SEU_LINK_DE_AFILIADO"){ e.preventDefault(); alert("⚙️ Configuração: preencha o seu link de afiliado em QUIZ_CONFIG.CHECKOUT no topo do arquivo."); } }
  });
  app.addEventListener("keydown",function(e){
    if(e.key==="Enter" && e.target.id==="nameInp"){ e.preventDefault(); state.name=(e.target.value||"").trim().replace(/[<>]/g,""); go(1); }
  });

  render();
})();
</script>
</body>
</html>
